<div class="container mt-4">
  @if (newCustomerFormGroup) {
  <div class="card">
    <div class="card-header">
      New Customer
    </div>
    <div class="card-body">
      <form [formGroup]="newCustomerFormGroup" (ngSubmit)="handleSaveCustomer()">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" id="name" class="form-control" formControlName="name"/>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-control" formControlName="email"/>
        </div>
        <button type="submit" [disabled]="!newCustomerFormGroup.valid"  class="btn btn-primary">Create Customer</button>
      </form>
    </div>
  </div>
  } @else if (true) {
    <div class="alert alert-danger" role="alert">
      Could not load form: <br> {{ true }}
    </div>
  } @else {
    <div class="d-flex justify-content-center">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  }
</div>
